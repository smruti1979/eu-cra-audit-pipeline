# cra-whitelist.yaml
# EU Cyber Resilience Act Compliance Whitelist Override Ledger
whitelisted_cves:

  # 🐍 Django 2.2.0 (Targeting CVE-2019-14234 - SQL Injection)
  - cve_id: "CVE-2019-14234"
    reason: "Risk mitigated. The vulnerable JSONField query filtering behavior is strictly isolated within the internal administrative control panel. This route is guarded behind single sign-on (SSO) and multi-factor authentication (MFA), and is completely inaccessible to unauthenticated public web traffic."

  # 🐍 Requests 2.28.1 (Targeting CVE-2023-32681 - Information Leakage via Authorization Headers)
  - cve_id: "CVE-2023-32681"
    reason: "Approved exception. The requests client instance is restricted to making backend server calls using relative network paths to safe, internal microservices within our private VPC cluster. It does not handle automatic cross-origin HTTP redirect sequences to untrusted exterior domains."

  # ☕ Log4j-core 2.14.1 (Targeting CVE-2021-44228 - Log4Shell Remote Code Execution)
  - cve_id: "CVE-2021-44228"
    reason: "Technical control applied. The underlying Java runtime engine has been hardcoded with the structural system property configuration flag '-Dlog4j2.formatMsgNoLookups=true'. This configuration permanently disables the JNDI lookup subsystem vector, eliminating the risk of arbitrary message lookups."

  # 🐹 OpenSSL 1.0.1f (Targeting CVE-2014-0160 - Heartbleed Information Disclosure)
  - cve_id: "CVE-2014-0160"
    reason: "Compensating boundary control. The application relies on OpenSSL exclusively to encrypt pre-authenticated inter-process memory pipes inside an air-gapped secure enclave. External public TLS negotiation boundaries are fully offloaded to an enterprise cloud web application firewall (WAF) running patched versions of OpenSSL."
